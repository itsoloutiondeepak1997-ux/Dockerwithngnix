version: '3.8'

services:
  dockerwithngnix:
    image: ${DOCKER_REGISTRY-}dockerwithngnix
    build:
      context: ./DockerWithNgnix
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      
